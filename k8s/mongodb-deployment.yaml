# MongoDB Deployment for TriageIQ.
# Apply: kubectl apply -f k8s/mongodb-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triageiq-mongodb
  labels:
    app: triageiq
    component: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triageiq
      component: mongodb
  template:
    metadata:
      labels:
        app: triageiq
        component: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
              name: mongo
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: triageiq-mongodb-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: triageiq-mongodb-pvc
  labels:
    app: triageiq
    component: mongodb
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
